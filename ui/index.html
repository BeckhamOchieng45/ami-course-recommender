<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AMI · Recommendations Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            ami: { 50:'#f0f7ff',100:'#e0effe',200:'#baddfd',300:'#7ec2fb',
                   400:'#399ef7',500:'#0f7fe8',600:'#0062c6',700:'#004ea0',
                   800:'#044384',900:'#0a3a6d',950:'#072449' }
          },
          fontFamily: { sans: ['Inter','system-ui','sans-serif'] },
          keyframes: {
            'fade-up':  { '0%':{opacity:'0',transform:'translateY(12px)'},'100%':{opacity:'1',transform:'translateY(0)'} },
            'fade-in':  { '0%':{opacity:'0'},'100%':{opacity:'1'} },
            'shimmer':  { '0%':{backgroundPosition:'-400px 0'},'100%':{backgroundPosition:'400px 0'} },
            'slide-in': { '0%':{opacity:'0',transform:'translateX(20px)'},'100%':{opacity:'1',transform:'translateX(0)'} },
          },
          animation: {
            'fade-up':'fade-up 0.3s ease both',
            'fade-in':'fade-in 0.2s ease both',
            'shimmer':'shimmer 1.4s linear infinite',
            'slide-in':'slide-in 0.3s ease both',
          }
        }
      }
    }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
  <style>
    /* ── Layout ──────────────────────────────────────────────── */
    html,body{height:100%;overflow:hidden;}
    #app{display:flex;height:100vh;overflow:hidden;}

    /* ── Sidebar ─────────────────────────────────────────────── */
    #sidebar{width:300px;flex-shrink:0;display:flex;flex-direction:column;overflow:hidden;background:#fff;border-right:1px solid #e2e8f0;}
    #learner-list{flex:1;overflow-y:auto;}
    .learner-item{padding:0.75rem 1rem;cursor:pointer;border-bottom:1px solid #f1f5f9;transition:all .15s;}
    .learner-item:hover{background:#f8fafc;}
    .learner-item.active{background:#f0f7ff;border-left:3px solid #0062c6;}
    .learner-item:not(.active){border-left:3px solid transparent;}

    /* ── Main panel ──────────────────────────────────────────── */
    #main{flex:1;display:flex;flex-direction:column;overflow:hidden;background:#f8fafc;}
    #main-content{flex:1;overflow-y:auto;padding:1.5rem;}

    /* ── Skeletons ───────────────────────────────────────────── */
    .skeleton{background:linear-gradient(90deg,#e2e8f0 25%,#f1f5f9 50%,#e2e8f0 75%);background-size:400px 100%;animation:shimmer 1.4s linear infinite;border-radius:8px;}

    /* ── Bars ────────────────────────────────────────────────── */
    .bar-fill{transition:width 0.9s cubic-bezier(0.4,0,0.2,1);}
    .signal-bar-segment{height:100%;display:inline-block;transition:width 0.9s cubic-bezier(0.4,0,0.2,1);}

    /* ── Confidence pills ────────────────────────────────────── */
    .conf-cold    {background:linear-gradient(135deg,#fef3c7,#fde68a);color:#92400e;}
    .conf-blended {background:linear-gradient(135deg,#dbeafe,#bfdbfe);color:#1e40af;}
    .conf-full    {background:linear-gradient(135deg,#d1fae5,#a7f3d0);color:#065f46;}

    /* ── Card stagger ────────────────────────────────────────── */
    .card-0{animation-delay:0ms}.card-1{animation-delay:60ms}.card-2{animation-delay:120ms}
    .card-3{animation-delay:180ms}.card-4{animation-delay:240ms}

    /* ── Scrollbar ───────────────────────────────────────────── */
    ::-webkit-scrollbar{width:5px;height:5px}
    ::-webkit-scrollbar-track{background:#f1f5f9}
    ::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:3px}

    /* ── Why overlay ─────────────────────────────────────────── */
    #why-overlay{position:fixed;inset:0;background:rgba(15,23,42,.45);z-index:40;display:none;align-items:flex-end;justify-content:center;}
    #why-overlay.open{display:flex;}
    #why-panel{max-height:88vh;width:100%;max-width:680px;overflow-y:auto;border-radius:1.25rem 1.25rem 0 0;background:#fff;animation:fade-up .3s ease both;padding:0 0 2rem 0;}
    @media(min-width:640px){#why-overlay{align-items:center;}#why-panel{max-height:85vh;border-radius:1.25rem;margin:1rem;}}

    /* ── Chat overlay ────────────────────────────────────────── */
    #chat-overlay{position:fixed;inset:0;background:rgba(15,23,42,.55);z-index:50;display:none;align-items:flex-end;justify-content:center;}
    #chat-overlay.open{display:flex;}
    #chat-panel{width:100%;max-width:680px;height:82vh;border-radius:1.5rem 1.5rem 0 0;background:#fff;display:flex;flex-direction:column;overflow:hidden;animation:fade-up .3s ease both;}
    @media(min-width:640px){#chat-overlay{align-items:center;}#chat-panel{height:80vh;border-radius:1.5rem;margin:1rem;}}

    /* ── Chat bubbles ────────────────────────────────────────── */
    .msg-user{background:#0062c6;color:#fff;border-radius:1rem 1rem 0.2rem 1rem;}
    .msg-assistant{background:#f1f5f9;color:#1e293b;border-radius:0.2rem 1rem 1rem 1rem;}
    .msg-assistant .prose p{margin:0 0 0.6em;line-height:1.65;}
    .msg-assistant .prose p:last-child{margin-bottom:0;}
    .msg-assistant .prose strong{font-weight:700;color:#0f172a;}
    .msg-assistant .prose ul{margin:0.4em 0 0.6em;padding-left:1.25em;list-style:disc;}
    .msg-assistant .prose ol{margin:0.4em 0 0.6em;padding-left:1.25em;list-style:decimal;}
    .msg-assistant .prose li{margin-bottom:0.3em;line-height:1.55;}
    .msg-assistant .prose li::marker{color:#0062c6;}
    .msg-assistant .prose code{background:#e2e8f0;padding:0.1em 0.4em;border-radius:4px;font-size:0.85em;color:#0062c6;}
    .streaming-cursor::after{content:'';display:inline-block;width:2px;height:14px;background:#0062c6;margin-left:2px;vertical-align:text-bottom;animation:blink .7s step-end infinite;}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
    .suggestion-chip{display:inline-block;font-size:0.75rem;font-weight:500;cursor:pointer;padding:0.375rem 0.875rem;border-radius:9999px;border:1px solid #baddfd;background:#f0f7ff;color:#004ea0;transition:all .15s;white-space:nowrap;}
    .suggestion-chip:hover{background:#0062c6;color:#fff;border-color:#0062c6;}
    #chat-input{min-height:44px;max-height:120px;resize:none;overflow-y:auto;}

    /* ── Tooltip ─────────────────────────────────────────────── */
    .tip{position:relative;cursor:help;}
    .tip:hover::after{content:attr(data-tip);position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);background:#0f172a;color:#f8fafc;font-size:11px;padding:4px 8px;border-radius:6px;white-space:nowrap;z-index:99;pointer-events:none;}
    .rec-card.selected{border-color:#0062c6!important;box-shadow:0 0 0 3px rgba(0,98,198,.12)!important;}

    details summary::-webkit-details-marker{display:none}
  </style>
</head>
<body class="h-full font-sans text-slate-800 antialiased">
<div id="app">

<!-- ══ SIDEBAR ══════════════════════════════════════════════════ -->
<aside id="sidebar">
  <!-- Sidebar header -->
  <div class="flex-shrink-0 px-4 py-4 border-b border-slate-100">
    <div class="flex items-center justify-between mb-3">
      <img src="/static/ami-logo.avif" alt="AMI" class="h-8 w-auto"
           onerror="this.replaceWith(Object.assign(document.createElement('span'),{className:'text-ami-700 font-extrabold text-lg tracking-tight',textContent:'AMI'}))" />
      <button onclick="handleLogout()" title="Sign out"
        class="p-1.5 rounded-lg text-slate-400 hover:text-slate-600 hover:bg-slate-100 transition-all">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
        </svg>
      </button>
    </div>
    <!-- Search -->
    <div class="relative">
      <svg class="absolute left-2.5 top-1/2 -translate-y-1/2 w-3.5 h-3.5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
      </svg>
      <input id="learner-search" type="text" placeholder="Search learners…"
        class="w-full pl-8 pr-3 py-1.5 text-xs rounded-lg border border-slate-200 bg-slate-50
               focus:outline-none focus:ring-1 focus:ring-ami-400 focus:bg-white transition-all"
        oninput="debouncedSearch()" />
    </div>
    <!-- Signal filters -->
    <div class="flex gap-1.5 mt-2.5">
      <button onclick="setSignalFilter('')"     id="f-all"       class="filter-btn active-filter px-2 py-0.5 text-xs rounded-full border font-medium transition-all">All</button>
      <button onclick="setSignalFilter('cold-start')" id="f-cold" class="filter-btn px-2 py-0.5 text-xs rounded-full border font-medium transition-all">Cold-start</button>
      <button onclick="setSignalFilter('blended')"    id="f-blend" class="filter-btn px-2 py-0.5 text-xs rounded-full border font-medium transition-all">Blended</button>
      <button onclick="setSignalFilter('behavioral')" id="f-behav" class="filter-btn px-2 py-0.5 text-xs rounded-full border font-medium transition-all">Behavioral</button>
    </div>
  </div>
  <!-- Learner count -->
  <div class="px-4 py-2 flex items-center justify-between border-b border-slate-50">
    <span id="learner-count-label" class="text-xs text-slate-400 font-medium">Loading…</span>
    <div class="flex gap-1">
      <button onclick="loadLearners(_page - 1)" id="prev-btn" class="p-1 rounded text-slate-400 hover:text-slate-600 disabled:opacity-30" disabled>
        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
      </button>
      <button onclick="loadLearners(_page + 1)" id="next-btn" class="p-1 rounded text-slate-400 hover:text-slate-600 disabled:opacity-30" disabled>
        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
      </button>
    </div>
  </div>
  <!-- List -->
  <div id="learner-list"></div>
</aside>

<!-- ══ MAIN PANEL ════════════════════════════════════════════════ -->
<div id="main">
  <!-- Top bar -->
  <header class="flex-shrink-0 bg-white border-b border-slate-200 px-6 py-3 flex items-center justify-between gap-4 shadow-sm">
    <div id="main-user-header" class="flex items-center gap-3">
      <div>
        <p class="text-xs text-slate-400 font-medium">Select a learner from the sidebar</p>
      </div>
    </div>
    <div class="flex items-center gap-3">
      <select id="n-param" class="text-xs px-2.5 py-1.5 rounded-lg border border-slate-200 bg-slate-50 font-medium focus:outline-none focus:ring-1 focus:ring-ami-400 transition-all appearance-none">
        <option value="3">3 results</option>
        <option value="5" selected>5 results</option>
        <option value="10">10 results</option>
      </select>
      <div id="user-badge" class="hidden items-center gap-2">
        <div class="w-7 h-7 rounded-full bg-ami-100 flex items-center justify-center">
          <span id="user-badge-initials" class="text-xs font-bold text-ami-700"></span>
        </div>
        <span id="user-badge-name" class="text-xs text-slate-600 font-medium max-w-[120px] truncate"></span>
      </div>
    </div>
  </header>

  <!-- Content -->
  <div id="main-content">
    <!-- Empty state -->
    <div id="empty-state" class="flex flex-col items-center justify-center h-full text-center py-20 animate-fade-in">
      <div class="w-16 h-16 rounded-2xl bg-ami-50 border border-ami-100 flex items-center justify-center mb-4">
        <svg class="w-8 h-8 text-ami-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/>
        </svg>
      </div>
      <h2 class="text-base font-bold text-slate-700">Choose a learner</h2>
      <p class="text-sm text-slate-400 mt-1 max-w-xs">Select anyone from the left panel to see their personalised course recommendations.</p>
    </div>
    <!-- Results injected here -->
    <div id="results" class="hidden"></div>
  </div>
</div>

</div><!-- end #app -->

<!-- ══ WHY OVERLAY ═══════════════════════════════════════════════ -->
<div id="why-overlay" onclick="closeWhy(event)">
  <div id="why-panel">
    <div class="sticky top-0 bg-white border-b border-slate-100 px-6 py-4 flex items-center justify-between rounded-t-2xl z-10">
      <div>
        <p class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Why this course?</p>
        <h3 id="why-title" class="text-base font-bold text-slate-900 mt-0.5 leading-snug"></h3>
      </div>
      <div class="flex items-center gap-2 flex-shrink-0 ml-3">
        <button onclick="openChatFromWhy()" class="flex items-center gap-1.5 px-3 py-1.5 rounded-full bg-ami-600 hover:bg-ami-700 text-white text-xs font-semibold transition-all shadow-sm">
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/></svg>
          Ask coach
        </button>
        <button onclick="closeWhy()" class="w-8 h-8 rounded-full bg-slate-100 hover:bg-slate-200 flex items-center justify-center transition-colors">
          <svg class="w-4 h-4 text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
        </button>
      </div>
    </div>
    <div id="why-body" class="px-6 pt-5 space-y-6 pb-6"></div>
  </div>
</div>

<!-- ══ CHAT OVERLAY ══════════════════════════════════════════════ -->
<div id="chat-overlay" onclick="closeChatOverlay(event)">
  <div id="chat-panel">
    <div class="flex-shrink-0 px-5 pt-5 pb-4 border-b border-slate-100">
      <div class="flex items-start justify-between gap-3">
        <div class="flex items-center gap-3">
          <div class="w-9 h-9 rounded-xl bg-gradient-to-br from-ami-500 to-ami-700 flex items-center justify-center flex-shrink-0 shadow-sm">
            <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/></svg>
          </div>
          <div>
            <h3 class="text-sm font-bold text-slate-900 leading-none">AMI AI Coach</h3>
            <p id="chat-subtitle" class="text-xs text-slate-500 mt-0.5 truncate max-w-xs"></p>
          </div>
        </div>
        <div class="flex items-center gap-2 flex-shrink-0">
          <button onclick="clearChatHistory()" class="text-xs text-slate-400 hover:text-slate-600 transition-colors px-2 py-1 rounded-lg hover:bg-slate-100">Clear</button>
          <button onclick="closeChatOverlay()" class="w-8 h-8 rounded-full bg-slate-100 hover:bg-slate-200 flex items-center justify-center transition-colors">
            <svg class="w-4 h-4 text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
          </button>
        </div>
      </div>
    </div>
    <div id="chat-messages" class="flex-1 overflow-y-auto px-5 py-4 space-y-4 scroll-smooth"></div>
    <div id="chat-suggestions" class="flex-shrink-0 px-5 pb-3">
      <p class="text-xs font-semibold text-slate-400 mb-2">Suggested questions</p>
      <div id="suggestions-list" class="flex flex-wrap gap-2"></div>
    </div>
    <div class="flex-shrink-0 px-5 pb-5 pt-3 border-t border-slate-100">
      <div class="flex items-end gap-3">
        <textarea id="chat-input" placeholder="Ask the coach anything about this recommendation…" rows="1"
          class="flex-1 px-4 py-2.5 rounded-xl border border-slate-200 bg-slate-50 text-sm text-slate-800
                 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-ami-500 focus:border-transparent
                 focus:bg-white transition-all leading-relaxed"
          onkeydown="handleChatKey(event)" oninput="autoResize(this)"></textarea>
        <button id="chat-send-btn" onclick="sendChatMessage()"
          class="flex-shrink-0 w-10 h-10 rounded-xl bg-ami-600 hover:bg-ami-700 flex items-center justify-center transition-all shadow-sm disabled:opacity-40 disabled:cursor-not-allowed">
          <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/></svg>
        </button>
      </div>
      <p class="text-xs text-slate-400 mt-2 text-center">AI coach · <span id="chat-llm-status"></span></p>
    </div>
  </div>
</div>

<script>
// ── Auth ──────────────────────────────────────────────────────────
function getToken() { return localStorage.getItem('ami_access'); }
function authHeaders() { return { 'Authorization': 'Bearer ' + getToken(), 'Content-Type': 'application/json' }; }

function handleLogout() {
  localStorage.removeItem('ami_access');
  localStorage.removeItem('ami_refresh');
  localStorage.removeItem('ami_user');
  window.location.href = '/login';
}

async function apiFetch(url, opts = {}) {
  opts.headers = { ...authHeaders(), ...(opts.headers || {}) };
  const resp = await fetch(url, opts);
  if (resp.status === 401) { handleLogout(); throw new Error('Unauthenticated'); }
  return resp;
}

// Guard: redirect to login if no token
(function() {
  if (!getToken()) { window.location.href = '/login'; }
  const user = JSON.parse(localStorage.getItem('ami_user') || '{}');
  if (user.name) {
    document.getElementById('user-badge').classList.remove('hidden');
    document.getElementById('user-badge').classList.add('flex');
    document.getElementById('user-badge-name').textContent = user.name;
    document.getElementById('user-badge-initials').textContent =
      user.name.split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase();
  }
})();

// ── Constants ─────────────────────────────────────────────────────
const DRIVER_CONFIG = {
  survey:  { label:'Survey match',   icon:'📝', bg:'bg-emerald-50',  text:'text-emerald-700',  border:'border-emerald-200',  hex:'#10b981', explain:"The learner's stated goals and skill gaps matched the skills this course teaches." },
  usage:   { label:'Usage-based',    icon:'📈', bg:'bg-blue-50',     text:'text-blue-700',     border:'border-blue-200',     hex:'#3b82f6', explain:"The course content is similar to courses this learner has already completed and engaged with deeply." },
  context: { label:'Work context',   icon:'🏢', bg:'bg-amber-50',    text:'text-amber-700',    border:'border-amber-200',    hex:'#f59e0b', explain:"The course level and programme area match this learner's seniority and industry." },
  cohort:  { label:'Cohort popular', icon:'👥', bg:'bg-violet-50',   text:'text-violet-700',   border:'border-violet-200',   hex:'#8b5cf6', explain:"Learners with the same role and industry at a similar stage have completed this course." },
  fallback:{ label:'General fit',    icon:'✦',  bg:'bg-slate-100',   text:'text-slate-600',    border:'border-slate-200',    hex:'#94a3b8', explain:"A strong general match based on available profile data." },
};
const LEVEL_CONFIG = {
  foundational:{ label:'Foundational', dot:'bg-emerald-400', text:'text-emerald-700', bg:'bg-emerald-50' },
  intermediate:{ label:'Intermediate', dot:'bg-amber-400',   text:'text-amber-700',   bg:'bg-amber-50' },
  advanced:    { label:'Advanced',     dot:'bg-rose-400',    text:'text-rose-700',    bg:'bg-rose-50' },
};
const AREA_LABELS = {
  entrepreneurship:'Entrepreneurship & Business Growth',
  leadership:'Executive Leadership & Management',
  workplace:'Workplace & Professional Growth',
  ai_strategy:'AI Strategy',
  womens_leadership:"Women's Leadership",
};
function escHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

// ── State ─────────────────────────────────────────────────────────
let _lastData=null, _selectedIdx=null, _activeLearner=null;
let _chatHistory=[], _chatRec=null, _chatUserId=null, _chatStreaming=false;
let _page=1, _totalPages=1, _signalFilter='', _searchQuery='';
let _searchTimer=null;
</script>

<script>
// ── Sidebar filter buttons ────────────────────────────────────────
function setSignalFilter(v) {
  _signalFilter = v;
  _page = 1;
  ['all','cold','blend','behav'].forEach(k => {
    const el = document.getElementById('f-'+k);
    el.classList.toggle('active-filter', (k==='all'&&v==='')||(k==='cold'&&v==='cold-start')||(k==='blend'&&v==='blended')||(k==='behav'&&v==='behavioral'));
  });
  loadLearners(1);
}
// Inject filter btn styles dynamically
document.head.insertAdjacentHTML('beforeend', `<style>
.filter-btn{background:#f8fafc;border-color:#e2e8f0;color:#64748b;}
.filter-btn:hover{background:#f0f7ff;border-color:#baddfd;color:#1e40af;}
.active-filter{background:#0062c6!important;border-color:#0062c6!important;color:#fff!important;}
</style>`);

function debouncedSearch() {
  clearTimeout(_searchTimer);
  _searchTimer = setTimeout(() => { _searchQuery = document.getElementById('learner-search').value; _page=1; loadLearners(1); }, 300);
}

// ── Load learner list ─────────────────────────────────────────────
async function loadLearners(page=1) {
  if (page < 1 || page > _totalPages) return;
  _page = page;
  const list = document.getElementById('learner-list');
  list.innerHTML = Array(8).fill(`
    <div class="px-4 py-3 border-b border-slate-50 flex gap-2.5">
      <div class="skeleton w-8 h-8 rounded-full flex-shrink-0"></div>
      <div class="flex-1 space-y-1.5 pt-0.5">
        <div class="skeleton h-3 w-3/4 rounded"></div>
        <div class="skeleton h-2.5 w-1/2 rounded"></div>
      </div>
    </div>`).join('');

  try {
    const params = new URLSearchParams({ page, page_size: 25 });
    if (_searchQuery) params.set('search', _searchQuery);
    if (_signalFilter) params.set('signal', _signalFilter);

    const resp = await apiFetch('/api/learners?' + params);
    const data = await resp.json();
    _totalPages = data.pages || 1;

    const countEl = document.getElementById('learner-count-label');
    countEl.textContent = `${data.total.toLocaleString()} learners · page ${data.page}/${data.pages}`;
    document.getElementById('prev-btn').disabled = data.page <= 1;
    document.getElementById('next-btn').disabled = data.page >= data.pages;

    if (!data.learners.length) {
      list.innerHTML = `<div class="px-4 py-8 text-center text-sm text-slate-400">No learners found</div>`;
      return;
    }

    const SIGNAL_BADGE = {
      'cold-start': '<span class="text-[10px] font-semibold px-1.5 py-0.5 rounded-full bg-amber-50 text-amber-700 border border-amber-200">Cold-start</span>',
      'blended':    '<span class="text-[10px] font-semibold px-1.5 py-0.5 rounded-full bg-blue-50 text-blue-700 border border-blue-200">Blended</span>',
      'behavioral': '<span class="text-[10px] font-semibold px-1.5 py-0.5 rounded-full bg-emerald-50 text-emerald-700 border border-emerald-200">Behavioral</span>',
    };
    const AVATAR_COLORS = ['bg-ami-100 text-ami-700','bg-emerald-100 text-emerald-700','bg-amber-100 text-amber-700','bg-violet-100 text-violet-700','bg-rose-100 text-rose-700'];

    list.innerHTML = data.learners.map((l, i) => {
      const colorClass = AVATAR_COLORS[i % AVATAR_COLORS.length];
      const isActive = _activeLearner && _activeLearner.user_id === l.user_id;
      return `
        <div class="learner-item ${isActive?'active':''}" onclick="selectLearner(${JSON.stringify(JSON.stringify(l))})">
          <div class="flex items-center gap-2.5">
            <div class="w-8 h-8 rounded-full ${colorClass} flex items-center justify-center flex-shrink-0 text-xs font-bold">
              ${escHtml(l.initials)}
            </div>
            <div class="flex-1 min-w-0">
              <div class="flex items-center justify-between gap-1">
                <span class="text-xs font-semibold text-slate-800 truncate">${escHtml(l.user_id)}</span>
                ${SIGNAL_BADGE[l.signal_mode]||''}
              </div>
              <p class="text-[11px] text-slate-500 truncate mt-0.5">${escHtml(l.role)}</p>
              <p class="text-[11px] text-slate-400 truncate">${escHtml(l.industry)} · ${l.completed_courses} completed</p>
            </div>
          </div>
        </div>`;
    }).join('');
  } catch(e) {
    list.innerHTML = `<div class="px-4 py-6 text-center text-xs text-red-500">Failed to load learners</div>`;
  }
}

function selectLearner(jsonStr) {
  const learner = JSON.parse(jsonStr);
  _activeLearner = learner;
  _lastData = null; _selectedIdx = null;

  // Update main header
  const conf = learner.usage_confidence;
  const confLabel = conf===0?'Cold-start':conf<1?`${Math.round(conf*100)}% behavioral`:'Fully behavioral';
  const confClass = conf===0?'conf-cold':conf<1?'conf-blended':'conf-full';
  document.getElementById('main-user-header').innerHTML = `
    <div>
      <div class="flex items-center gap-2">
        <h2 class="text-sm font-bold text-slate-900">${escHtml(learner.user_id)}</h2>
        <span class="${confClass} text-xs font-bold px-2 py-0.5 rounded-full">${confLabel}</span>
      </div>
      <p class="text-xs text-slate-500 mt-0.5">${escHtml(learner.role)} · ${escHtml(learner.industry)} · <em class="not-italic">${escHtml(learner.stated_goal.length>60?learner.stated_goal.slice(0,57)+'…':learner.stated_goal)}</em></p>
    </div>`;

  // Highlight sidebar item
  document.querySelectorAll('.learner-item').forEach(el => el.classList.remove('active'));
  event.currentTarget.classList.add('active');

  document.getElementById('empty-state').classList.add('hidden');
  document.getElementById('results').classList.remove('hidden');
  fetchRecs(learner.user_id);
}
</script>

<script>
// ── Recommendation cards ──────────────────────────────────────────
function showSkeletons(n=3) {
  return Array.from({length:n},()=>`
    <div class="bg-white rounded-2xl border border-slate-100 shadow-sm p-5 mb-3">
      <div class="flex gap-3"><div class="skeleton w-10 h-10 rounded-xl flex-shrink-0"></div>
        <div class="flex-1 space-y-2.5"><div class="skeleton h-4 w-3/4 rounded"></div>
          <div class="skeleton h-3 w-1/2 rounded"></div>
          <div class="skeleton h-12 w-full rounded-xl mt-2"></div>
          <div class="skeleton h-2 w-full rounded-full"></div>
        </div>
      </div></div>`).join('');
}

function renderSignalBar(breakdown, total) {
  if (!total) return '';
  const bars = breakdown.map(b => {
    const dk = b.component.includes('survey')?'survey':b.component.includes('usage')?'usage':'context';
    const cfg = DRIVER_CONFIG[dk]; const pct = ((b.contribution/total)*100).toFixed(1);
    return `<div class="signal-bar-segment tip rounded-full" style="width:0%;background:${cfg.hex}" data-tip="${cfg.label}: ${(+pct).toFixed(0)}% of score" data-width="${pct}%"></div>`;
  }).join('');
  return `<div class="h-1.5 w-full bg-slate-100 rounded-full overflow-hidden flex mt-2.5">${bars}</div>`;
}

function renderRec(rec, idx) {
  const c = rec.course;
  const driver = DRIVER_CONFIG[rec.reason_driver]||DRIVER_CONFIG.fallback;
  const level = LEVEL_CONFIG[c.level]||{label:c.level,dot:'bg-slate-400',text:'text-slate-600',bg:'bg-slate-50'};
  const area = AREA_LABELS[c.programme_area]||c.programme_area.replace(/_/g,' ');
  const pct = Math.round(rec.score*100); const isTop = idx===0;
  const skills = c.skills_taught.slice(0,4).map(s=>`<span class="inline-flex items-center px-2 py-0.5 rounded-full text-[10px] font-medium bg-slate-100 text-slate-600 border border-slate-200">${escHtml(s)}</span>`).join('');
  const signalBar = renderSignalBar(rec.score_breakdown, rec.score);

  return `<div class="rec-card group relative bg-white rounded-2xl border ${isTop?'border-ami-200 shadow-md':'border-slate-100 shadow-sm'} hover:shadow-lg hover:border-ami-200 transition-all duration-300 mb-3 overflow-hidden animate-fade-up card-${idx} cursor-pointer" onclick="openWhy(${idx})" data-idx="${idx}">
    ${isTop?`<div class="absolute top-0 left-0 right-0 h-0.5 bg-gradient-to-r from-ami-500 to-ami-400"></div>`:''}
    <div class="p-4">
      <div class="flex items-start gap-3">
        <div class="flex-shrink-0 w-10 h-10 rounded-xl ${isTop?'bg-ami-600':'bg-slate-100'} flex items-center justify-center">
          <span class="text-base font-extrabold ${isTop?'text-white':'text-slate-400'}">${rec.position}</span>
        </div>
        <div class="flex-1 min-w-0">
          <div class="flex items-start justify-between gap-2">
            <h2 class="text-sm font-bold text-slate-900 leading-snug">${escHtml(c.title)}</h2>
            <div class="relative w-8 h-8 flex-shrink-0 ml-1">
              <svg class="w-8 h-8 -rotate-90" viewBox="0 0 32 32">
                <circle cx="16" cy="16" r="13" fill="none" stroke="#e2e8f0" stroke-width="3"/>
                <circle cx="16" cy="16" r="13" fill="none" stroke="${isTop?'#0062c6':'#94a3b8'}" stroke-width="3" stroke-dasharray="${(pct/100)*81.7} 81.7" stroke-linecap="round"/>
              </svg>
              <span class="absolute inset-0 flex items-center justify-center text-[9px] font-bold text-slate-600">${pct}</span>
            </div>
          </div>
          <div class="flex flex-wrap items-center gap-1.5 mt-1">
            <span class="inline-flex items-center gap-1 text-[10px] font-medium ${level.bg} ${level.text} px-1.5 py-0.5 rounded-full"><span class="w-1.5 h-1.5 rounded-full ${level.dot}"></span>${level.label}</span>
            <span class="text-[10px] text-slate-400">·</span><span class="text-[10px] text-slate-500">${c.duration_mins} min</span>
            <span class="text-[10px] text-slate-400">·</span><span class="text-[10px] text-slate-500 truncate max-w-[130px]">${escHtml(area)}</span>
          </div>
        </div>
      </div>
      <div class="mt-2.5 bg-slate-50 border border-slate-100 rounded-xl px-3 py-2">
        <div class="flex items-start gap-1.5"><span class="text-sm mt-0.5 flex-shrink-0">${driver.icon}</span>
          <p class="text-xs text-slate-700 leading-relaxed">${escHtml(rec.coaching_reason||rec.reason)}</p>
        </div>
      </div>
      ${signalBar}
      <div class="flex items-center justify-between mt-2.5 gap-2">
        <div class="flex flex-wrap gap-1">${skills}</div>
        <div class="flex items-center gap-1.5 flex-shrink-0">
          <button onclick="event.stopPropagation();openWhy(${idx})" class="flex items-center gap-1 text-[10px] font-semibold text-slate-500 hover:text-ami-700 bg-slate-100 hover:bg-ami-50 px-2 py-1 rounded-full transition-all border border-slate-200 hover:border-ami-200">
            <svg class="w-2.5 h-2.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.228 9c.549-1.165 2.03-2 3.772-2 2.21 0 4 1.343 4 3 0 1.4-1.278 2.575-3.006 2.907-.542.104-.994.54-.994 1.093m0 3h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>Why?
          </button>
          <button onclick="event.stopPropagation();openChatDirect(${idx})" class="flex items-center gap-1 text-[10px] font-semibold text-white bg-ami-600 hover:bg-ami-700 px-2 py-1 rounded-full transition-all shadow-sm">
            <svg class="w-2.5 h-2.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/></svg>Ask coach
          </button>
        </div>
      </div>
    </div>
  </div>`;
}

async function fetchRecs(userId) {
  const n = document.getElementById('n-param').value;
  const results = document.getElementById('results');
  results.innerHTML = showSkeletons(parseInt(n));
  try {
    const resp = await apiFetch(`/api/users/${encodeURIComponent(userId)}/recommendations?n=${n}`);
    const data = await resp.json();
    _lastData = data;
    if (!data.recommendations||!data.recommendations.length) {
      results.innerHTML = `<div class="bg-white rounded-2xl border border-slate-100 shadow-sm p-12 text-center animate-fade-up"><div class="text-4xl mb-3">🎓</div><h3 class="text-base font-bold text-slate-800 mb-1">All caught up!</h3><p class="text-sm text-slate-500">This learner has completed all available courses.</p></div>`;
      return;
    }
    let html = '';
    data.recommendations.forEach((r,i) => { html += renderRec(r,i); });
    results.innerHTML = html;
    requestAnimationFrame(()=>{ setTimeout(()=>{ document.querySelectorAll('.signal-bar-segment[data-width]').forEach(el=>{el.style.width=el.dataset.width;}); },80); });
  } catch(e) {
    results.innerHTML = `<div class="bg-white rounded-2xl border border-red-100 p-6 text-center"><p class="text-sm text-red-500">Failed to load recommendations: ${escHtml(e.message)}</p></div>`;
  }
}

// Re-fetch when n changes
document.getElementById('n-param').addEventListener('change', () => {
  if (_activeLearner) fetchRecs(_activeLearner.user_id);
});
</script>

<script>
// ── Why panel ─────────────────────────────────────────────────────
function openWhy(idx) {
  if (!_lastData) return;
  const rec = _lastData.recommendations[idx];
  if (!rec) return;
  document.querySelectorAll('.rec-card').forEach(el=>el.classList.remove('selected'));
  const card = document.querySelector(`.rec-card[data-idx="${idx}"]`);
  if (card) card.classList.add('selected');
  _selectedIdx = idx;
  const c = rec.course;
  const driver = DRIVER_CONFIG[rec.reason_driver]||DRIVER_CONFIG.fallback;
  const level = LEVEL_CONFIG[c.level]||{label:c.level,dot:'bg-slate-400',text:'text-slate-600',bg:'bg-slate-50'};
  const area = AREA_LABELS[c.programme_area]||c.programme_area.replace(/_/g,' ');
  const conf = rec.usage_confidence;
  const freed = 0.40*(1-Math.min(1,conf));
  const wU=(0.40*Math.min(1,conf)*100).toFixed(0), wS=((0.35+freed*0.60)*100).toFixed(0), wC=((0.25+freed*0.40)*100).toFixed(0);
  document.getElementById('why-title').textContent = c.title;
  const total = rec.score;
  const bkd = rec.score_breakdown.map(b=>{
    const dk=b.component.includes('survey')?'survey':b.component.includes('usage')?'usage':'context';
    const cfg=DRIVER_CONFIG[dk]; const sp=total>0?((b.contribution/total)*100).toFixed(0):0; const rp=(b.raw_score*100).toFixed(0);
    const isBest=rec.score_breakdown.reduce((a,x)=>x.contribution>a.contribution?x:a,rec.score_breakdown[0]).component===b.component;
    return `<div class="flex items-center gap-3 py-2.5 border-b border-slate-50 last:border-0">
      <span class="text-base flex-shrink-0">${cfg.icon}</span>
      <div class="flex-1 min-w-0">
        <div class="flex items-center gap-2 mb-1"><span class="text-xs font-semibold text-slate-700">${cfg.label}</span>${isBest?`<span class="text-xs bg-ami-100 text-ami-700 px-1.5 py-0.5 rounded-full font-medium">primary</span>`:''}</div>
        <div class="h-1.5 bg-slate-100 rounded-full overflow-hidden"><div class="bar-fill h-full rounded-full" style="width:0%;background:${cfg.hex}" data-width="${sp}%"></div></div>
      </div>
      <div class="text-right flex-shrink-0 w-20"><div class="text-xs font-bold text-slate-700">${sp}% of score</div><div class="text-xs text-slate-400 font-mono">raw: ${rp}%</div></div>
    </div>`;
  }).join('');
  const skills = c.skills_taught.map(s=>`<span class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium bg-slate-100 text-slate-600 border border-slate-200">${escHtml(s)}</span>`).join(' ');
  document.getElementById('why-body').innerHTML = `
    <div>
      <p class="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Coach recommendation</p>
      <div class="flex items-start gap-3 bg-slate-50 border border-slate-100 rounded-xl p-4">
        <span class="text-2xl flex-shrink-0">${driver.icon}</span>
        <div><p class="text-sm text-slate-800 leading-relaxed font-medium">${escHtml(rec.coaching_reason||rec.reason)}</p>${rec.coaching_reason&&rec.coaching_reason!==rec.reason?`<p class="text-xs text-slate-400 mt-1.5">✦ Enhanced by Groq AI</p>`:''}</div>
      </div>
    </div>
    <div>
      <p class="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Primary signal</p>
      <div class="inline-flex items-center gap-2 ${driver.bg} ${driver.border} border px-3 py-1.5 rounded-full mb-2"><span>${driver.icon}</span><span class="text-xs font-semibold ${driver.text}">${driver.label}</span></div>
      <p class="text-sm text-slate-700 leading-relaxed">${driver.explain}</p>
      <p class="text-xs text-slate-500 mt-2 italic">${escHtml(rec.reason_detail)}</p>
    </div>
    <div>
      <p class="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-3">How the score was built</p>
      <div class="divide-y divide-slate-50">${bkd}</div>
    </div>
    <div>
      <p class="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Why these weights?</p>
      <div class="bg-slate-50 border border-slate-100 rounded-xl p-4 space-y-3">
        <p class="text-xs text-slate-600 leading-relaxed">${conf===0?`Cold-start: usage_confidence = 0. Survey gets ${wS}%, context gets ${wC}%, usage = 0%.`:conf<1?`usage_confidence = ${(conf*100).toFixed(0)}% (${Math.round(conf*5)}/5 courses). Effective: survey ${wS}%, usage ${wU}%, context ${wC}%.`:`Full history (5+ courses). Base weights: survey 35%, usage 40%, context 25%.`}</p>
        <div class="font-mono text-xs bg-slate-100 rounded-lg px-3 py-2 text-slate-600 leading-relaxed">w_survey = 0.35 + (0.40 × ${(1-conf).toFixed(2)} × 0.60) = ${(+wS/100).toFixed(2)}<br>w_usage  = 0.40 × ${conf.toFixed(2)} = ${(+wU/100).toFixed(2)}<br>w_context= 0.25 + (0.40 × ${(1-conf).toFixed(2)} × 0.40) = ${(+wC/100).toFixed(2)}</div>
      </div>
    </div>
    <div>
      <p class="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-3">Course details</p>
      <div class="bg-slate-50 border border-slate-100 rounded-xl p-4 space-y-3">
        <div class="flex flex-wrap gap-2">
          <span class="inline-flex items-center gap-1 text-xs font-medium ${level.bg} ${level.text} px-2 py-0.5 rounded-full"><span class="w-1.5 h-1.5 rounded-full ${level.dot}"></span>${level.label}</span>
          <span class="text-xs bg-slate-100 text-slate-600 px-2 py-0.5 rounded-full font-medium">${escHtml(area)}</span>
          <span class="text-xs bg-slate-100 text-slate-600 px-2 py-0.5 rounded-full font-medium">${c.duration_mins} min</span>
          ${c.is_paid?`<span class="text-xs bg-amber-50 text-amber-700 border border-amber-200 px-2 py-0.5 rounded-full font-medium">🎓 Certificate</span>`:`<span class="text-xs bg-slate-100 text-slate-500 px-2 py-0.5 rounded-full font-medium">Free</span>`}
        </div>
        <div><p class="text-xs font-semibold text-slate-500 mb-1.5">Skills taught</p><div class="flex flex-wrap gap-1.5">${skills}</div></div>
      </div>
    </div>`;
  document.getElementById('why-overlay').classList.add('open');
  requestAnimationFrame(()=>{ setTimeout(()=>{ document.querySelectorAll('#why-body .bar-fill[data-width]').forEach(el=>{el.style.width=el.dataset.width;}); },60); });
}

function closeWhy(e) {
  if (e && e.target!==document.getElementById('why-overlay')) return;
  document.getElementById('why-overlay').classList.remove('open');
  document.querySelectorAll('.rec-card').forEach(el=>el.classList.remove('selected'));
  _selectedIdx=null;
}
</script>

<script>
// ── Chat ──────────────────────────────────────────────────────────
const SUGGESTED_QUESTIONS = [
  "Why is this course right for me specifically?",
  "What will I be able to do after completing this?",
  "Is this the right level for where I am now?",
  "How does this connect to my goal?",
];

function openChatFromWhy() {
  if (!_lastData||_selectedIdx===null) return;
  _chatRec=_lastData.recommendations[_selectedIdx]; _chatUserId=_lastData.user_id;
  _renderChatThread();
  document.getElementById('chat-subtitle').textContent=_chatRec.course.title;
  document.getElementById('chat-llm-status').textContent=_lastData.llm_enhanced?'AI enhanced':'Set GROQ_API_KEY to enable';
  document.getElementById('chat-overlay').classList.add('open');
  setTimeout(()=>document.getElementById('chat-input').focus(),100);
}
function openChatDirect(idx) {
  if (!_lastData) return;
  if (_selectedIdx!==idx) _chatHistory=[];
  _selectedIdx=idx; openChatFromWhy();
}
function closeChatOverlay(e) {
  if (e&&e.target!==document.getElementById('chat-overlay')) return;
  document.getElementById('chat-overlay').classList.remove('open');
}
function clearChatHistory() { _chatHistory=[]; _renderChatThread(); }
function autoResize(el) { el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,120)+'px'; }
function handleChatKey(e) { if (e.key==='Enter'&&!e.shiftKey) { e.preventDefault(); sendChatMessage(); } }

function _md(text) {
  if (typeof marked!=='undefined') { marked.setOptions({breaks:true,gfm:true}); return marked.parse(text||''); }
  return escHtml(text).replace(/\n/g,'<br>');
}

function _renderChatThread() {
  const container=document.getElementById('chat-messages');
  const suggestions=document.getElementById('chat-suggestions');
  if (!_chatHistory.length) {
    container.innerHTML=`<div class="flex flex-col items-center justify-center h-full text-center py-8 animate-fade-in"><div class="w-14 h-14 rounded-2xl bg-gradient-to-br from-ami-500 to-ami-700 flex items-center justify-center mb-4 shadow-md"><svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/></svg></div><p class="text-sm font-semibold text-slate-700">Ask me anything about this recommendation</p><p class="text-xs text-slate-400 mt-1 max-w-xs">I know this learner's profile, history, and exactly why this course was suggested.</p></div>`;
    suggestions.classList.remove('hidden');
    document.getElementById('suggestions-list').innerHTML=SUGGESTED_QUESTIONS.slice(0,4).map(q=>`<button class="suggestion-chip" onclick="useSuggestion(this)">${escHtml(q)}</button>`).join('');
  } else {
    suggestions.classList.add('hidden');
    container.innerHTML='';
    _chatHistory.forEach(m=>container.appendChild(_buildBubble(m.role,m.content,false)));
    container.scrollTop=container.scrollHeight;
  }
}

function useSuggestion(btn) { document.getElementById('chat-input').value=btn.textContent; document.getElementById('chat-suggestions').classList.add('hidden'); sendChatMessage(); }

function _buildBubble(role,content,isStreaming) {
  const wrap=document.createElement('div'); wrap.className=`flex ${role==='user'?'justify-end':'justify-start'} animate-fade-in`;
  const bubble=document.createElement('div'); bubble.className=`max-w-[85%] px-4 py-3 text-sm ${role==='user'?'msg-user':'msg-assistant'}`;
  if (role==='assistant') {
    const row=document.createElement('div'); row.className='flex items-end gap-2';
    const avatar=document.createElement('div'); avatar.className='w-6 h-6 rounded-full bg-gradient-to-br from-ami-500 to-ami-700 flex-shrink-0 mb-0.5 flex items-center justify-center';
    avatar.innerHTML=`<svg class="w-3.5 h-3.5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M8 12h.01M12 12h.01M16 12h.01"/></svg>`;
    const prose=document.createElement('div'); prose.className='prose';
    if (isStreaming){prose.classList.add('streaming-cursor');prose.textContent=content;}else{prose.innerHTML=_md(content);}
    bubble.appendChild(prose); row.appendChild(avatar); row.appendChild(bubble); wrap.appendChild(row);
  } else { bubble.textContent=content; wrap.appendChild(bubble); }
  bubble.dataset.role=role; return wrap;
}

async function sendChatMessage() {
  if (_chatStreaming||!_chatRec||!_chatUserId) return;
  const input=document.getElementById('chat-input');
  const question=input.value.trim(); if (!question) return;
  input.value=''; input.style.height='auto';
  document.getElementById('chat-suggestions').classList.add('hidden');
  const container=document.getElementById('chat-messages');
  if (!_chatHistory.length) container.innerHTML='';
  _chatHistory.push({role:'user',content:question});
  container.appendChild(_buildBubble('user',question,false));
  container.scrollTop=container.scrollHeight;
  const assistantWrap=_buildBubble('assistant','',true); container.appendChild(assistantWrap);
  container.scrollTop=container.scrollHeight;
  const proseEl=assistantWrap.querySelector('.prose');
  _chatStreaming=true; document.getElementById('chat-send-btn').disabled=true;
  let full='';
  function _finalize(){ proseEl.classList.remove('streaming-cursor'); proseEl.innerHTML=_md(full); }
  try {
    const resp=await apiFetch('/api/chat',{method:'POST',body:JSON.stringify({user_id:_chatUserId,question,recommendation:_chatRec,history:_chatHistory.slice(0,-1)})});
    if (!resp.ok){const err=await resp.json().catch(()=>({}));proseEl.classList.remove('streaming-cursor');proseEl.innerHTML=`<p class="text-red-500">${escHtml(err.error||'Something went wrong')}</p>`;}
    else {
      const reader=resp.body.getReader(); const decoder=new TextDecoder(); let buf='';
      while(true){const{done,value}=await reader.read();if(done)break;buf+=decoder.decode(value,{stream:true});
        const lines=buf.split('\n');buf=lines.pop();
        for(const line of lines){if(!line.startsWith('data: '))continue;const chunk=line.slice(6);
          if(chunk==='[DONE]'){_finalize();break;}if(chunk.startsWith('[ERROR]')){proseEl.classList.remove('streaming-cursor');proseEl.innerHTML=`<p class="text-red-500">${escHtml(chunk.slice(8))}</p>`;break;}
          full+=chunk.replace(/\\n/g,'\n');proseEl.textContent=full;container.scrollTop=container.scrollHeight;}}
      if(proseEl.classList.contains('streaming-cursor'))_finalize();
    }
  } catch(e){proseEl.classList.remove('streaming-cursor');proseEl.innerHTML=`<p class="text-red-500">Network error: ${escHtml(e.message)}</p>`;}
  if(full)_chatHistory.push({role:'assistant',content:full});
  _chatStreaming=false; document.getElementById('chat-send-btn').disabled=false;
  input.focus(); container.scrollTop=container.scrollHeight;
}

document.addEventListener('keydown', e=>{
  if (e.key!=='Escape') return;
  if (document.getElementById('chat-overlay').classList.contains('open')) closeChatOverlay();
  else closeWhy();
});

// ── Init ──────────────────────────────────────────────────────────
loadLearners(1);
